<!DOCTYPE html>
<html lang="en">
<head>
    <title>Векторная поисковая система</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        input[type=text] { width: 400px; padding: 8px; }
        button { padding: 8px; }
        .result { margin-top: 15px; }
        .score { color: gray; }
    </style>
</head>
<body>

<h2>Векторная поисковая система (TF-IDF)</h2>

<form method="POST">
    <input type="text" name="query" placeholder="Введите запрос..." value="{{ query }}">
    <button type="submit">Поиск</button>
</form>

{% if results %}
    <h3>Топ 10 результатов:</h3>
    {% for doc_id, score in results %}
        <div class="result">
            {{ loop.index }}. Документ {{ doc_id }}.txt 
            <b class="score">Сходство: {{ "%.5f"|format(score) }}</b>
        </div>
    {% endfor %}
{% elif query %}
    <p>Ничего не найдено</p>
{% endif %}

</body>
</html>
